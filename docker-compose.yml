version: '3.8'

services:
  # Frontend App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    restart: unless-stopped

  # Backend API
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=10.0.3.10
      - POSTGRES_USER=messenger
      - POSTGRES_PASSWORD=messenger_pass
      - POSTGRES_DB=messenger
    restart: unless-stopped

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=messenger
      - POSTGRES_PASSWORD=messenger_pass
      - POSTGRES_DB=messenger
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # RustFS S3 Storage
  rustfs:
    image: rustfs/rustfs:latest
    environment:
      - RUSTFS_ROOT_USER=admin
      - RUSTFS_ROOT_PASSWORD=admin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rustfs_data:

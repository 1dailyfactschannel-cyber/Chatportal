services:
  # Frontend App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  # Backend API
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8081:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=postgres
      - POSTGRES_USER=messenger
      - POSTGRES_PASSWORD=messenger_pass
      - POSTGRES_DB=messenger
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=messenger
      - POSTGRES_PASSWORD=messenger_pass
      - POSTGRES_DB=messenger
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messenger -d messenger"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # RustFS S3 Storage (internal only)
  rustfs:
    image: rustfs/rustfs:latest
    environment:
      - RUSTFS_ROOT_USER=admin
      - RUSTFS_ROOT_PASSWORD=admin123
    volumes:
      - rustfs_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
